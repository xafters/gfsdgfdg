<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odliczanie do 18</title>

  <!-- Open Graph — Discord/Facebook/Twitter preview -->
  <meta property="og:title" content="⏳ Odliczanie do 18" />
  <meta property="og:description" content="Sprawdź ile zostało do wielkiego dnia!" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://og-image-service.vercel.app/Odliczanie%20do%2018.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="⏳ Odliczanie do 18" />
  <meta name="twitter:description" content="Sprawdź ile zostało do wielkiego dnia!" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap"
    rel="stylesheet" />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: rgba(255, 255, 255, 0.07);
      --accent: #c084fc;
      --accent2: #818cf8;
      --text: #f1f0ff;
      --muted: rgba(241, 240, 255, 0.45);
      --radius: 18px;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* subtle grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(192, 132, 252, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(192, 132, 252, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .container {
      width: min(520px, 94vw);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .headline {
      font-size: clamp(52px, 14vw, 96px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #f1f0ff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .date-label {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 3rem;
    }

    .units {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 2rem;
    }

    .unit {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 0.5rem 1rem;
      position: relative;
      overflow: hidden;
    }

    .unit::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .unit.tick::before {
      opacity: 1;
    }

    .num {
      font-size: clamp(28px, 7vw, 42px);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 6px;
      font-variant-numeric: tabular-nums;
    }

    .lbl {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* progress */
    .progress-track {
      height: 3px;
      background: var(--border);
      border-radius: 100px;
      overflow: hidden;
      margin-bottom: 0.75rem;
    }

    .progress-fill {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      transition: width 1s linear;
      width: 0%;
    }

    .progress-text {
      font-size: 12px;
      color: var(--muted);
    }

    /* party state */
    .party {
      display: none;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      padding: 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    @media (prefers-reduced-motion: reduce) {
      .progress-fill {
        transition: none;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="eyebrow">jeszcze tylko</div>
    <div class="headline">18</div>
    <div class="date-label">16 lipca 2026</div>

    <div class="units" id="units">
      <div class="unit" id="card-d">
        <div class="num" id="u-d">--</div>
        <div class="lbl">dni</div>
      </div>
      <div class="unit" id="card-h">
        <div class="num" id="u-h">--</div>
        <div class="lbl">godz.</div>
      </div>
      <div class="unit" id="card-m">
        <div class="num" id="u-m">--</div>
        <div class="lbl">min.</div>
      </div>
      <div class="unit" id="card-s">
        <div class="num" id="u-s">--</div>
        <div class="lbl">sek.</div>
      </div>
    </div>

    <div class="progress-track">
      <div class="progress-fill" id="pbar"></div>
    </div>
    <div class="progress-text" id="ptxt"></div>

    <div class="party" id="party">🎉 Osiemnastka! Wszystkiego najlepszego! 🎂</div>
  </div>

  <script>
    const TARGET = new Date('2026-07-16T00:00:00');
    const START = new Date('2025-01-01T00:00:00');

    function pad(n) { return String(n).padStart(2, '0'); }

    function flashCard(id) {
      const el = document.getElementById('card-' + id);
      el.classList.remove('tick');
      void el.offsetWidth;
      el.classList.add('tick');
      setTimeout(() => el.classList.remove('tick'), 400);
    }

    let prev = {};

    function tick() {
      const now = new Date();
      const diff = TARGET - now;

      if (diff <= 0) {
        document.getElementById('units').style.display = 'none';
        document.getElementById('pbar').style.width = '100%';
        document.getElementById('ptxt').textContent = '';
        document.getElementById('party').style.display = 'block';
        return;
      }

      const totalSec = Math.floor(diff / 1000);
      const d = Math.floor(totalSec / 86400);
      const h = Math.floor((totalSec % 86400) / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;

      if (d !== prev.d) { document.getElementById('u-d').textContent = d; if (prev.d !== undefined) flashCard('d'); }
      if (h !== prev.h) { document.getElementById('u-h').textContent = pad(h); if (prev.h !== undefined) flashCard('h'); }
      if (m !== prev.m) { document.getElementById('u-m').textContent = pad(m); if (prev.m !== undefined) flashCard('m'); }
      if (s !== prev.s) { document.getElementById('u-s').textContent = pad(s); if (prev.s !== undefined) flashCard('s'); }
      prev = { d, h, m, s };

      const span = TARGET - START;
      const elapsed = now - START;
      const pct = Math.min(100, Math.max(0, (elapsed / span) * 100));
      document.getElementById('pbar').style.width = pct.toFixed(3) + '%';
      document.getElementById('ptxt').textContent = 'minęło ' + pct.toFixed(2) + '% czasu';
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>

</html>
